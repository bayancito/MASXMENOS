{% extends 'base.html' %}

{% block title %}
Eliminar Producto
{% endblock %}

{% block content %}

<h2>Eliminar Producto</h2>

<p>
    ¿Deseas eliminar el producto
    <strong>{{ producto.nombre }}</strong>?
</p>

<form method="post">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger">

        Eliminar

    </button>

    <a href="{% url 'detalle_producto' producto.id %}"
       class="btn btn-secondary">

        Cancelar

    </a>

</form>

{% endblock %}
