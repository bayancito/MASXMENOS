{% extends 'base.html' %}

{% block title %}
Iniciar Sesión
{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    Iniciar Sesión
                </h4>
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Ingresar

                    </button>

                </form>

                <div class="text-center mt-3">
                    <span class="text-secondary">
                        ¿No tienes cuenta?
                    </span>
                    <a
                        href="{% url 'registro' %}"
                        class="fw-semibold text-success text-decoration-none"
                    >
                        Regístrate aquí
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
