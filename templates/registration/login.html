{% extends 'base.html' %}

{% block title %}
Iniciar Sesión
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <h2 class="mb-4">
            Iniciar Sesión
        </h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Ingresar
            </button>

        </form>

    </div>

</div>

{% endblock %}
